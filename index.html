<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YouTube AI Studio — استوديو يوتيوب الذكي</title>
<meta name="description" content="منصة متكاملة لإدارة وتنمية قنوات يوتيوب بالذكاء الاصطناعي — 145 أداة احترافية">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- الشريط الجانبي -->
<aside id="sidebar" aria-label="القائمة الرئيسية">
  <div id="sidebar-header">
    <div id="logo">
      <i class="fa-brands fa-youtube"></i>
      <div>
        <strong>YouTube AI Studio</strong>
        <small>استوديو يوتيوب الذكي</small>
      </div>
    </div>
    <button id="sidebar-close" class="icon-btn" aria-label="إغلاق القائمة"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div id="sidebar-search-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="search" id="sidebar-search" placeholder="ابحث فى 145 أداة..." autocomplete="off">
  </div>
  <nav id="sidebar-nav"><!-- يُبنى ديناميكياً --></nav>
</aside>
<div id="sidebar-backdrop"></div>

<!-- المحتوى -->
<div id="main">
  <header id="topbar">
    <button id="menu-btn" class="icon-btn" aria-label="فتح القائمة"><i class="fa-solid fa-bars"></i></button>
    <div id="breadcrumb">الرئيسية</div>
    <div id="topbar-actions">
      <span id="quota-badge" title="طلبات API اليوم"><i class="fa-solid fa-bolt"></i> <span id="quota-count">0</span></span>
      <button id="theme-btn" class="icon-btn" aria-label="تبديل الوضع الليلي"><i class="fa-solid fa-moon"></i></button>
      <a href="#/settings" class="icon-btn" aria-label="الإعدادات"><i class="fa-solid fa-gear"></i></a>
    </div>
  </header>
  <main id="content" aria-live="polite"></main>
</div>

<!-- إشعارات -->
<div id="toast-container" role="status"></div>

<!-- مؤشر تحميل -->
<div id="spinner-overlay" hidden>
  <div class="spinner-box">
    <div class="spinner"></div>
    <p id="spinner-msg">جارِ المعالجة...</p>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/tools-core.js"></script>
<script src="js/tools-m1-3.js"></script>
<script src="js/tools-m4-6.js"></script>
<script src="js/tools-m7.js"></script>
<script src="js/tools-m8.js"></script>
<script src="js/tools-m9.js"></script>
<script src="js/engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
